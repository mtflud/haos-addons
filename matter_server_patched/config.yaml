---
version: "1.2.2-wd.3"
slug: matter_server_patched
name: Matter Server (patched)
description: >-
  Matter Server fork (matterjs-server + subscription-liveness watchdog that
  detects silently-dead node subscriptions and forces a resubscribe).
url: >-
  https://github.com/mtflud/haos-addons/tree/main/matter_server_patched
arch:
  - aarch64
  - amd64
discovery:
  - matter
hassio_api: true
homeassistant: 2024.6.0
# IPC is only used within the Add-on
host_ipc: false
host_network: true
host_dbus: true
ingress: true
ingress_port: 5580
init: false
map:
  - type: addon_config
    read_only: false
options:
  log_level: info
  enable_test_net_dcl: false
schema:
  log_level: list(debug|info|notice|warn|error|fatal|verbose|warning|critical)
  enable_test_net_dcl: bool?
  ble_proxy: bool?
  bluetooth_adapter_id: int?
  matter_server_args:
    - str?
  matter_server_env_vars:
    - match(^[A-Za-z_][A-Za-z0-9_]*=.*$)?
ports:
  5580/tcp: null
stage: experimental
startup: services
